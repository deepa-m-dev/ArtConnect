<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtConnect | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="bg-container">
<div class="center-box">
    <div class="card p-4" style="width: 350px;">
        <h3 class="text-center mb-3 text-dark fw-bold">Login</h3>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label text-dark">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-dark">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <p th:text="${error}" class="text-danger"></p>
            <button type="submit" class="btn btn-dark w-100">Login</button>
        </form>
        <p class="mt-2 text-center text-dark">Don't have an account? <a th:href="@{/register}">Register</a></p>
    </div></div></div>
</body>
</html>
